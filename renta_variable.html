<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renta Variable — Variación Semanal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@600;700&display=swap');
  :root{
    --bg:#f5f3ee;
    --surface:#ffffff;
    --ink:#111110;
    --ink-soft:#4a4844;
    --ink-faint:#8a877d;
    --line:#dedad2;
    --green:#0e7c3a;
    --green-bar:#1a9c4e;
    --red:#b5291d;
    --red-bar:#d93b2b;
    --serif:'IBM Plex Serif',Georgia,serif;
    --sans:'IBM Plex Sans',-apple-system,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    font-size:14px;
    line-height:1.6;
    padding:44px 20px 80px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;}
  .masthead{
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;margin-bottom:6px;
    display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:8px;
  }
  .masthead-left{}
  .kicker{
    font-family:var(--sans);font-size:10.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ink-faint);font-weight:600;
  }
  .masthead h1{
    font-family:var(--serif);font-size:28px;font-weight:700;
    letter-spacing:-.02em;margin-top:4px;line-height:1.1;color:var(--ink);
  }
  .masthead-source{
    font-size:11px;color:var(--ink-faint);font-weight:500;letter-spacing:.03em;
    white-space:nowrap;padding-bottom:4px;
  }
  .panel{
    background:var(--surface);
    border:1px solid var(--line);
    border-top:3px solid var(--ink);
    padding:26px 28px 32px;
    margin-top:24px;
  }
  .panel-head{
    border-bottom:1px solid var(--line);
    padding-bottom:12px;margin-bottom:20px;
    display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;
  }
  .panel-head h2{
    font-family:var(--serif);font-size:19px;font-weight:700;letter-spacing:-.02em;color:var(--ink);
  }
  .panel-head .sub{
    font-size:11.5px;color:var(--ink-faint);font-weight:500;white-space:nowrap;
  }
  .kpis{
    display:grid;gap:0;margin-bottom:26px;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    border:1px solid var(--line);
  }
  .kpi{padding:10px 16px;border-left:1px solid var(--line);background:var(--bg);}
  .kpi:first-child{border-left:none;}
  .kpi .label{font-size:10.5px;color:var(--ink-faint);letter-spacing:.04em;text-transform:uppercase;font-weight:600;margin-bottom:4px;}
  .kpi .val{font-family:var(--sans);font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1.1;}
  .pos{color:var(--green);}
  .neg{color:var(--red);}
  .neu{color:var(--ink);}
  .legend{
    display:flex;flex-wrap:wrap;gap:16px;margin-bottom:12px;
    font-size:11.5px;color:var(--ink-soft);font-weight:500;
  }
  .legend span{display:flex;align-items:center;gap:5px;}
  .swatch{width:10px;height:10px;border-radius:1px;display:inline-block;}
  .chart-box{position:relative;width:100%;}
  .footnote{
    font-size:11px;color:var(--ink-faint);margin-top:18px;
    border-top:1px solid var(--line);padding-top:12px;line-height:1.5;
    font-weight:400;
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div class="masthead-left">
      <div class="kicker">Resumen de mercado · Renta variable</div>
      <h1>Variación semanal por papel</h1>
    </div>
    <div class="masthead-source">Fuente: IAMC</div>
  </header>

  <section class="panel">
    <div class="panel-head">
      <h2>Acciones argentinas</h2>
      <div class="sub">Variación % semanal · en pesos</div>
    </div>

    <div class="kpis">
      <div class="kpi"><div class="label">Merval ARS</div><div class="val neg">−2,6%</div></div>
      <div class="kpi"><div class="label">Merval USD</div><div class="val neg">−4,1%</div></div>
      <div class="kpi"><div class="label">Energía</div><div class="val pos">+2,43%</div></div>
      <div class="kpi"><div class="label">Bancos</div><div class="val neg">−3,90%</div></div>
    </div>

    <div class="legend">
      <span><i class="swatch" style="background:var(--green-bar)"></i>Suba</span>
      <span><i class="swatch" style="background:var(--red-bar)"></i>Baja</span>
    </div>

    <div class="chart-box" style="height:420px;">
      <canvas id="rvChart"></canvas>
    </div>

    <p class="footnote">Variación porcentual semanal en pesos. Datos: IAMC.</p>
  </section>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){
  const GREEN='#1a9c4e', RED='#d93b2b';
  const sans="'IBM Plex Sans',-apple-system,Helvetica,Arial,sans-serif";

  function insideLabels(rows){
    return {
      id:'il_rv',
      afterDatasetsDraw(chart){
        const {ctx} = chart;
        const meta = chart.getDatasetMeta(0);
        const zeroX = chart.scales.x.getPixelForValue(0);
        ctx.save();
        ctx.font = '600 12px ' + sans;
        ctx.textBaseline = 'middle';

        meta.data.forEach((bar, i) => {
          const v = rows[i][1];
          const txt = (v > 0 ? '+' : '') + v.toFixed(2) + '%';
          const txtW = ctx.measureText(txt).width;
          const barLen = Math.abs(bar.x - zeroX);

          if(barLen > txtW + 16){
            ctx.textAlign = v >= 0 ? 'right' : 'left';
            const x = v >= 0 ? bar.x - 8 : bar.x + 8;
            ctx.fillStyle = '#ffffff';
            ctx.fillText(txt, x, bar.y);
          } else {
            ctx.textAlign = v >= 0 ? 'left' : 'right';
            const x = v >= 0 ? bar.x + 7 : bar.x - 7;
            ctx.fillStyle = v >= 0 ? '#0a5228' : '#8a1c12';
            ctx.fillText(txt, x, bar.y);
          }
        });
        ctx.restore();
      }
    };
  }

  const rv=[
    ['YPF',3.48],['Supervielle',-1.22],['BBVA Argentina',-3.31],['Galicia',-3.87],
    ['Edenor',-4.17],['Banco Macro',-4.97],['Central Puerto',-5.52],['Cresud',-6.44],
    ['Loma Negra',-6.82],['Telecom Argentina',-7.80],['Comercial del Plata',-9.83]
  ].sort((a,b)=>b[1]-a[1]);

  new Chart(document.getElementById('rvChart'),{
    type:'bar',
    data:{
      labels: rv.map(r=>r[0]),
      datasets:[{
        data: rv.map(r=>r[1]),
        backgroundColor: rv.map(r=>r[1]>=0 ? GREEN : RED),
        borderRadius: 2,
        barPercentage: 0.68
      }]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      layout:{ padding:{ right:16, left:0, top:4, bottom:4 } },
      plugins:{ legend:{display:false}, tooltip:{enabled:false} },
      scales:{
        x:{
          ticks:{
            callback: v => (v>0?'+':'')+v+'%',
            font:{size:11, family:sans, weight:'500'},
            color:'#8a877d'
          },
          grid:{ color:'rgba(0,0,0,0.06)' },
          border:{display:false}
        },
        y:{
          ticks:{
            font:{size:13, family:sans, weight:'500'},
            color:'#111110'
          },
          grid:{display:false},
          border:{display:false}
        }
      }
    },
    plugins:[insideLabels(rv)]
  });
})();
</script>
</body>
</html>
